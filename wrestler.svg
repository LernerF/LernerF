<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="200" height="200" shape-rendering="crispEdges">
  <defs>
    <style>
      @keyframes breathe {
        0%, 100% { transform: translateY(0) scaleY(1); }
        50% { transform: translateY(-2px) scaleY(1.02); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 0.6; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      .wrestler { animation: breathe 2s ease-in-out infinite; transform-origin: center bottom; }
      .shadow { animation: pulse 2s ease-in-out infinite; }
      .whole { animation: float 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Фон  -->
  <rect width="320" height="320" fill="none"/>
  
  <g class="whole">
    <!-- Тень -->
    <rect x="120" y="295" width="80" height="8" fill="#1a474a" opacity="0.4" class="shadow"/>
    
    <g class="wrestler">
      <!-- Ноги -->
      <rect x="135" y="240" width="25" height="35" fill="#fdbcb4"/>
      <rect x="160" y="240" width="25" height="35" fill="#fdbcb4"/>
      
      <!-- Ботинки красные -->
      <rect x="132" y="270" width="20" height="12" fill="#e63946"/>
      <rect x="168" y="270" width="20" height="12" fill="#e63946"/>
      <rect x="132" y="268" width="20" height="4" fill="#ff6b6b"/>
      <rect x="168" y="268" width="20" height="4" fill="#ff6b6b"/>
      
      <!-- Тело (красная борцовка) -->
      <rect x="140" y="180" width="40" height="65" fill="#e63946"/>
      <rect x="138" y="180" width="6" height="60" fill="#d62839"/>
      <rect x="176" y="180" width="6" height="60" fill="#d62839"/>
      
      <!-- Черная полоса на борцовке -->
      <rect x="157" y="180" width="6" height="65" fill="#1a1a1a"/>
      
      <!-- Руки -->
      <!-- Левая рука -->
      <rect x="110" y="185" width="12" height="35" fill="#fdbcb4"/>
      <rect x="105" y="180" width="10" height="12" fill="#fdbcb4"/>
      <!-- Кулак -->
      <rect x="102" y="215" width="14" height="14" fill="#fdbcb4"/>
      <rect x="100" y="213" width="6" height="8" fill="#1a1a1a"/>
      
      <!-- Правая рука -->
      <rect x="198" y="185" width="12" height="35" fill="#fdbcb4"/>
      <rect x="205" y="180" width="10" height="12" fill="#fdbcb4"/>
      <!-- Кулак -->
      <rect x="204" y="215" width="14" height="14" fill="#fdbcb4"/>
      <rect x="214" y="213" width="6" height="8" fill="#1a1a1a"/>
      
      <!-- Голова -->
      <rect x="135" y="110" width="50" height="55" fill="#fdbcb4"/>
      
      <!-- Волосы  -->
      <rect x="133" y="105" width="54" height="12" fill="#5c4033"/>
      <rect x="130" y="110" width="6" height="25" fill="#5c4033"/>
      <rect x="184" y="110" width="6" height="25" fill="#5c4033"/>
      <rect x="135" y="102" width="50" height="6" fill="#5c4033"/>
      
      <!-- Лицо -->
      <!-- Глаза -->
      <rect x="145" y="130" width="10" height="8" fill="#1a1a1a"/>
      <rect x="165" y="130" width="10" height="8" fill="#1a1a1a"/>
      <rect x="147" y="132" width="4" height="4" fill="#ffffff"/>
      <rect x="167" y="132" width="4" height="4" fill="#ffffff"/>
      
      <!-- Брови ) -->
      <rect x="143" y="125" width="12" height="3" fill="#5c4033"/>
      <rect x="165" y="125" width="12" height="3" fill="#5c4033"/>
      
      <!-- Нос -->
      <rect x="156" y="142" width="8" height="10" fill="#e8a898"/>
      
      <!-- Рот -->
      <rect x="150" y="155" width="20" height="4" fill="#1a1a1a"/>
      
      <!-- Эффект энергии -->
      <rect x="90" y="150" width="4" height="4" fill="#ff6b6b" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.5s" repeatCount="indefinite"/>
      </rect>
      <rect x="226" y="170" width="4" height="4" fill="#ff6b6b" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.2;0.5" dur="2s" repeatCount="indefinite"/>
      </rect>
      <rect x="100" y="200" width="3" height="3" fill="#ffd700" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.3;0.6" dur="1.8s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
