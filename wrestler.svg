<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <style>
      @keyframes breathe {
        0%, 100% { transform: scaleY(1) translateY(0); }
        50% { transform: scaleY(1.02) translateY(-2px); }
      }
      @keyframes shadow {
        0%, 100% { opacity: 0.3; transform: scaleX(1); }
        50% { opacity: 0.2; transform: scaleX(0.9); }
      }
      .wrestler { animation: breathe 3s ease-in-out infinite; transform-origin: bottom center; }
      .shadow { animation: shadow 3s ease-in-out infinite; transform-origin: center; }
    </style>
  </defs>
  
  <!-- Тень -->
  <ellipse class="shadow" cx="100" cy="290" rx="50" ry="8" fill="#000" opacity="0.3"/>
  
  <g class="wrestler">
    <!-- Тело борца в красном трико -->
    <ellipse cx="100" cy="80" rx="22" ry="26" fill="#e8c4a0"/>
    <!-- Волосы -->
    <path d="M78 75 Q80 55 100 52 Q120 55 122 75 Q115 65 100 63 Q85 65 78 75Z" fill="#2c1810"/>
    <!-- Трико -->
    <path d="M75 105 Q70 150 72 200 L80 200 Q78 150 82 110Z" fill="#cc0000"/>
    <path d="M125 105 Q130 150 128 200 L120 200 Q122 150 118 110Z" fill="#cc0000"/>
    <rect x="82" y="105" width="36" height="95" rx="5" fill="#cc0000"/>
    <!-- Чёрная полоса -->
    <rect x="97" y="105" width="6" height="95" fill="#1a1a1a"/>
    <!-- Руки -->
    <path d="M75 110 Q60 140 55 170 Q58 172 62 170 Q68 145 80 120Z" fill="#e8c4a0"/>
    <path d="M125 110 Q140 140 145 170 Q142 172 138 170 Q132 145 120 120Z" fill="#e8c4a0"/>
    <!-- Напульсники -->
    <rect x="53" y="162" width="12" height="10" rx="2" fill="#1a1a1a"/>
    <rect x="135" y="162" width="12" height="10" rx="2" fill="#1a1a1a"/>
    <!-- Ноги -->
    <path d="M82 195 Q80 230 78 270 L90 270 Q90 230 92 195Z" fill="#e8c4a0"/>
    <path d="M108 195 Q110 230 112 270 L122 270 Q120 230 118 195Z" fill="#e8c4a0"/>
    <!-- Ботинки -->
    <path d="M75 268 Q75 285 90 285 L92 268Z" fill="#1a1a1a"/>
    <path d="M108 268 Q108 285 123 285 L125 268Z" fill="#1a1a1a"/>
    <!-- Лицо -->
    <circle cx="92" cy="78" r="2.5" fill="#1a1a1a"/>
    <circle cx="108" cy="78" r="2.5" fill="#1a1a1a"/>
    <path d="M95 90 Q100 93 105 90" stroke="#1a1a1a" stroke-width="1.5" fill="none"/>
  </g>
</svg>
