<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 50">
  <style>
    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink {
      50% { border-color: transparent; }
    }
    .text {
      font-family: monospace;
      font-size: 20px;
      fill: #fff;
      overflow: hidden;
      white-space: nowrap;
      animation: typing 3s steps(30) infinite alternate, blink 0.7s step-end infinite;
      border-right: 2px solid #fff;
    }
  </style>
  <text class="text" x="10" y="35">Building data pipelines... 💪</text>
</svg>
